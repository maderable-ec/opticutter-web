# Serves the built SPA. This container sits behind Caddy (see opticutter-infra),
# which owns TLS, compression, security headers and the request body limit.
#
# nginx is left with only what requires knowing the shape of the build: the
# client-side routing fallback, and cache lifetimes per path.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Caddy compresses at the edge. Compressing here too would just cost CPU.
    gzip off;

    # Vite emits content-addressed filenames (index-87cV_xGP.js), so a given URL
    # can never change contents. Cache it for a year.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # The HTML shell names the current hashed assets. Caching it would pin
    # clients to a previous deploy's bundle.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The app uses BrowserRouter, so /orders/5 is a client-side route with no
    # file behind it. Without this fallback, a refresh or a shared deep link 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
