name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # Vite 8 needs Node 20.19+ / 22.12+.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # There is no test suite. `validate` is `tsc --noEmit && eslint src`, and
      # the eslint config runs prettier as a rule, so formatting is covered too.
      - run: npm run validate

      - run: npm run build
